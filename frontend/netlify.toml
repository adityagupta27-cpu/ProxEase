[build]
  command = "npm run build"
  publish = "out"

# SPA redirection fallback for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-term caching headers for build assets to optimize load times on mobile and all devices
[[headers]]
  for = "/_next/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
